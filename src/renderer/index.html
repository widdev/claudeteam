<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:*; script-src 'self';">
  <title></title>
  <link rel="stylesheet" href="dist/bundle.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <div id="toolbar-left">
      <div id="agent-dropdown-container">
        <button id="btn-new-agent" title="Add new agent">+ New Agent</button>
        <div id="agent-dropdown" class="dropdown hidden">
          <div class="dropdown-item new-agent" id="dropdown-new">New...</div>
          <div id="dropdown-recent-list"></div>
        </div>
      </div>
    </div>
    <div id="toolbar-center">
      <div id="session-name-display">
        <span id="session-label"></span>
        <button id="btn-edit-name" class="btn-edit-name hidden" title="Rename session">&#9998;</button>
      </div>
      <div id="session-name-edit" class="hidden">
        <input type="text" id="session-name-input" autocomplete="off" spellcheck="false">
        <button id="btn-save-name" class="btn-name-action" title="Save">&#10003;</button>
        <button id="btn-cancel-name" class="btn-name-action" title="Cancel">&#10005;</button>
      </div>
    </div>
    <div id="toolbar-right">
      <button id="btn-toggle-layout" class="btn-icon" title="Switch agent layout mode"></button>
    </div>
  </div>

  <!-- Welcome screen -->
  <div id="welcome-screen">
    <div id="welcome-content">
      <h1>ClaudeSession</h1>
      <p>Multi-agent session manager</p>
      <button id="btn-create-session">Create New Session</button>
      <button id="btn-open-session" class="welcome-secondary">Open Existing Session</button>
    </div>
  </div>

  <!-- Main area -->
  <div id="main-area" class="hidden">
    <!-- Agent shells (left, fixed) -->
    <div id="agent-panel-wrapper">
      <div id="agent-gl-container">
        <div id="empty-agent-prompt">
          <h2>Let's get started</h2>
          <p>You don't have any agents running yet.<br>Press below to create your first agent.</p>
          <button id="btn-empty-new-agent">Create New Agent</button>
        </div>
      </div>
      <div id="agents-statusbar" class="panel-statusbar">
        <select id="terminal-zoom-select" title="Terminal zoom level">
          <option value="75">75%</option><option value="85">85%</option>
          <option value="100" selected>100%</option><option value="115">115%</option>
          <option value="130">130%</option><option value="150">150%</option>
        </select>
      </div>
    </div>
    <!-- Splitter -->
    <div id="panel-splitter"></div>
    <!-- Right dock (Discussion + Tasks) -->
    <div id="dock-container"></div>
  </div>

  <!-- New Agent Modal -->
  <div id="new-agent-modal" class="modal-overlay hidden">
    <div class="modal-dialog">
      <h2>New Agent</h2>
      <label class="modal-label">Please give your agent a name and colour</label>
      <div class="modal-field">
        <label for="modal-agent-name">Name</label>
        <input type="text" id="modal-agent-name" autocomplete="off" spellcheck="false">
      </div>
      <div class="modal-field">
        <label>Colour</label>
        <div id="modal-color-swatches" class="color-swatch-grid"></div>
      </div>
      <label class="modal-label">Please select the working directory for your agent (you can change this later)</label>
      <div class="modal-field modal-dir-field">
        <span id="modal-agent-path" class="modal-path-display"></span>
        <button id="modal-select-dir">Select</button>
      </div>
      <div class="modal-info-box">
        <div class="modal-info-icon">!</div>
        <div class="modal-info-content">
          <label class="modal-info-label">
            <input type="checkbox" id="modal-auto-permissions" checked>
            <span>Agents created in ClaudeSession will be initialised with permission to use <code>curl</code> and <code>printf</code> so that they can communicate with each other out of the box.</span>
          </label>
        </div>
      </div>
      <div class="modal-actions">
        <button id="modal-cancel-btn" class="modal-btn-secondary">Cancel</button>
        <button id="modal-create-btn" class="modal-btn-primary">Create</button>
      </div>
    </div>
  </div>

  <!-- Session Name Modal -->
  <div id="name-modal" class="modal-overlay hidden">
    <div class="modal-dialog" style="width: 360px;">
      <h2 id="name-modal-title">Save Session</h2>
      <div class="modal-field">
        <label for="modal-session-name">Session Name</label>
        <input type="text" id="modal-session-name" autocomplete="off" spellcheck="false" placeholder="My Session">
      </div>
      <div class="modal-actions">
        <button id="name-modal-cancel" class="modal-btn-secondary">Cancel</button>
        <button id="name-modal-ok" class="modal-btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Archive Modal -->
  <div id="archive-modal" class="modal-overlay hidden">
    <div class="modal-dialog" style="width: 400px;">
      <h2>Archive Discussion</h2>
      <p style="color: var(--text-secondary); font-size: 12px; margin-bottom: 16px;">Save the discussion history as a text file.</p>
      <div class="modal-field">
        <label for="archive-path-display">Save to</label>
        <div class="modal-dir-field">
          <span id="archive-path-display" class="modal-path-display"></span>
          <button id="archive-select-dir">Browse</button>
        </div>
      </div>
      <div class="modal-field">
        <label class="modal-info-label" style="gap: 6px; cursor: pointer;">
          <input type="checkbox" id="archive-clear-on-save" checked>
          <span>Clear discussion after saving</span>
        </label>
      </div>
      <div class="modal-actions">
        <button id="archive-cancel" class="modal-btn-secondary">Cancel</button>
        <button id="archive-save" class="modal-btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="dist/bundle.js"></script>
</body>
</html>
